<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设置 - Starling 目标语言自动勾选</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="side">
        <div class="brand">Starling 目标语言自动勾选</div>
        <nav class="nav">
          <button class="navItem" data-page="presets">预设管理</button>
          <button class="navItem" data-page="manual">手动配置</button>
          <button class="navItem" data-page="rules">站点匹配规则</button>
          <button class="navItem" data-page="import">导入导出</button>
          <button class="navItem" data-page="about">关于</button>
        </nav>
      </aside>

      <main class="main">
        <section class="panel" id="page-presets"></section>
        <section class="panel" id="page-manual" hidden></section>
        <section class="panel" id="page-rules" hidden></section>
        <section class="panel" id="page-import" hidden></section>
        <section class="panel" id="page-about" hidden></section>
      </main>
    </div>

    <script type="module" src="options.mjs"></script>
  </body>
</html>
